<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Sở thích của tôi</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    ul { list-style-type: square; }
    .images { display: flex; gap: 20px; margin-top: 20px; }
    .images img { width: 200px; height: auto; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Sở thích của tôi</h1>
  
  <h2>Danh sách</h2>
  <ul>
    <li>Game</li>
    <li>Thể thao</li>
    <li>Nghe nhạc</li>
  </ul>
  
  <h2>Hình ảnh</h2>
  <div class="images">
    <img src="images1.png" alt="Game">
    <img src="images2.png" alt="Thể thao">
    <img src="images3.png" alt="Nghe nhạc">
  </div>
  
  <p>Xem thêm tại: <a href="https://www.google.com" target="_blank">Google</a></p>
</body>
</html>
